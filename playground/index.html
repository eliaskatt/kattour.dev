<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Kattour Playground</title><script src="https://cdn.tailwindcss.com"></script><style>body{font-family:Inter,system-ui,sans-serif}textarea{tab-size:2}</style></head><body class="bg-gray-950 text-white h-screen overflow-hidden"><div class="grid grid-cols-2 grid-rows-[56px_1fr] h-screen"><header class="col-span-2 border-b border-gray-800 flex items-center justify-between px-6 bg-gray-900"><div class="flex items-center gap-3"><img src="../assets/images/logo.png" class="w-8 h-8 rounded-lg"><span class="font-bold text-xl">Kattour Playground</span></div><div class="flex gap-3"><button id="runBtn" class="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-lg">Run</button></div></header><section class="border-r border-gray-800 flex flex-col"><div class="px-4 py-3 border-b border-gray-800 text-sm text-gray-400">Kattour Code</div><textarea id="editor" class="flex-1 bg-gray-950 text-gray-100 p-5 outline-none resize-none">page Home

state count = 0

route "/" {
  column {
    title "Hello Kattour"
    text "Fast UI language"
    button "Click me"
  }
}</textarea></section><section class="grid grid-rows-2"><div class="flex flex-col border-b border-gray-800"><div class="px-4 py-3 border-b border-gray-800 text-sm text-gray-400">Live Preview</div><iframe id="preview" class="flex-1 bg-white"></iframe></div><div class="grid grid-cols-2"><div class="border-r border-gray-800 flex flex-col"><div class="px-4 py-3 border-b border-gray-800 text-sm text-gray-400">AST</div><pre id="ast" class="flex-1 overflow-auto p-4 text-xs text-cyan-300"></pre></div><div class="flex flex-col"><div class="px-4 py-3 border-b border-gray-800 text-sm text-gray-400">Generated HTML</div><pre id="html" class="flex-1 overflow-auto p-4 text-xs text-green-300"></pre></div></div></section></div><script>const editor=document.getElementById('editor');const preview=document.getElementById('preview');const ast=document.getElementById('ast');const html=document.getElementById('html');function compile(){const src=editor.value;const lines=src.split('\n').map(v=>v.trim()).filter(Boolean);const tree={type:'Program',body:lines};ast.textContent=JSON.stringify(tree,null,2);let out='';for(const line of lines){if(line.startsWith('title')){out+='<h1 style="font-family:sans-serif">'+line.replace('title','').replaceAll('"','').trim()+'</h1>';}if(line.startsWith('text')){out+='<p style="font-family:sans-serif">'+line.replace('text','').replaceAll('"','').trim()+'</p>';}if(line.startsWith('button')){out+='<button style="padding:12px 18px;border:none;border-radius:12px;background:#4f46e5;color:white">'+line.replace('button','').replaceAll('"','').trim()+'</button>';}}html.textContent=out;preview.srcdoc='<!DOCTYPE html><html><body style="padding:40px;font-family:sans-serif">'+out+'</body></html>';}document.getElementById('runBtn').onclick=compile;compile();</script></body></html>
