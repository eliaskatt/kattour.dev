<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Kattour Playground</title><script src="https://cdn.tailwindcss.com"></script><style>body{font-family:Inter,system-ui,sans-serif}.editor{tab-size:2;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}.tab.active{background:#4f46e5;color:#fff}.panel{display:none}.panel.active{display:block}</style></head><body class="bg-gray-950 text-white h-screen overflow-hidden"><div class="grid grid-cols-2 grid-rows-[56px_1fr] h-screen"><header class="col-span-2 border-b border-gray-800 flex items-center justify-between px-6 bg-gray-900"><a href="../index.html" class="flex items-center gap-3"><img src="../assets/images/logo.png" class="w-8 h-8 rounded-lg"><span class="font-bold text-xl">Kattour Playground</span></a><div class="flex items-center gap-3"><select id="examples" class="bg-gray-800 border border-gray-700 rounded-lg px-3 py-2 text-sm"><option value="starter">Starter</option><option value="featureList">Feature List</option><option value="dashboard">Dashboard</option><option value="delivery">Food Delivery</option><option value="chat">AI Chat</option></select><button id="copyBtn" class="bg-gray-800 hover:bg-gray-700 px-4 py-2 rounded-lg text-sm">Copy</button><button id="runBtn" class="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded-lg text-sm">Render</button></div></header><section class="border-r border-gray-800 flex flex-col"><div class="px-4 py-3 border-b border-gray-800 text-sm text-gray-400 flex justify-between"><span>Kattour Code</span><span id="status" class="text-green-400">Ready</span></div><textarea id="editor" spellcheck="false" class="editor flex-1 bg-gray-950 text-gray-100 p-5 outline-none resize-none leading-6"></textarea></section><section class="grid grid-rows-[1fr_280px]"><div class="flex flex-col border-b border-gray-800"><div class="px-4 py-3 border-b border-gray-800 text-sm text-gray-400 flex justify-between"><span>Live Preview</span><span class="text-xs text-gray-500">new Kattour syntax only</span></div><iframe id="preview" class="flex-1 bg-white"></iframe></div><div class="flex flex-col"><div class="flex gap-2 p-3 border-b border-gray-800 bg-gray-900"><button class="tab active px-3 py-1 rounded-lg text-sm" data-tab="ast">AST</button><button class="tab px-3 py-1 rounded-lg text-sm bg-gray-800" data-tab="html">HTML</button><button class="tab px-3 py-1 rounded-lg text-sm bg-gray-800" data-tab="diagnostics">Diagnostics</button></div><div class="flex-1 overflow-hidden"><pre id="ast" class="panel active h-full overflow-auto p-4 text-xs text-cyan-300"></pre><pre id="html" class="panel h-full overflow-auto p-4 text-xs text-green-300"></pre><pre id="diagnostics" class="panel h-full overflow-auto p-4 text-xs text-red-300"></pre></div></div></section></div><script>const samples={starter:`page Home\n\nstate count = 0\n\nroute "/" {\n  column {\n    title "Hello Kattour"\n    text "Fast UI language"\n    button "Click me"\n  }\n}`,featureList:`page FeatureList\n\nroute "/" {\n  section {\n    title "Everything you need to build."\n    text "From simple buttons to complex data tables, we have you covered."\n    feature "Fast & Lightweight" {\n      text "Built for performance."\n    }\n    feature "Fully Responsive" {\n      text "Looks great on any screen."\n    }\n    feature "Easily Customizable" {\n      text "Design tokens make it simple."\n    }\n  }\n}`,dashboard:`page Dashboard\n\nstate revenue = "48.2K"\n\nroute "/" {\n  column {\n    title "Analytics Dashboard"\n    text "Revenue: $revenue"\n    button "Refresh"\n  }\n}`,delivery:`page FoodDelivery\n\nstate city = "Flensburg"\n\nroute "/" {\n  column {\n    title "Food Delivery"\n    text "Restaurants near $city"\n    button "Order now"\n  }\n}`,chat:`page AIChat\n\nstate model = "Kattour AI"\n\nroute "/" {\n  column {\n    title "$model"\n    text "Ask anything"\n    button "Send"\n  }\n}`};const editor=document.getElementById('editor');const preview=document.getElementById('preview');const ast=document.getElementById('ast');const html=document.getElementById('html');const diagnostics=document.getElementById('diagnostics');const status=document.getElementById('status');const examples=document.getElementById('examples');editor.value=samples.starter;function esc(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;')}function clean(v){return String(v??'').trim().replace(/^['\"]|['\"]$/g,'')}function extractQuoted(line){const m=line.match(/"([^"]*)"/);return m?m[1]:line.replace(/^[a-zA-Z]+/,'').trim()}function renderNew(src){const errors=[];if(/^\s*(module|type|features|subtitle)\s*:/m.test(src)||/^\s*-\s+[a-zA-Z]+\s*:/m.test(src)){errors.push('Legacy YAML-like syntax is not supported. Use new Kattour block syntax only.');return{tree:{type:'Error',reason:'LegacySyntaxRejected'},out:'<main style="padding:40px;font-family:Inter,system-ui,sans-serif;color:#991b1b;background:#fff1f2;min-height:100vh"><h1>Invalid syntax</h1><p>Use new Kattour block syntax only.</p></main>',errors}}const lines=src.split('\n').map((v,i)=>({raw:v,line:i+1,text:v.trim()})).filter(v=>v.text);const tree={type:'Program',body:[]};let out='<main style="padding:40px;font-family:Inter,system-ui,sans-serif;background:#f8fafc;min-height:100vh;color:#111827">';let featureGridOpen=false;for(const item of lines){const line=item.text;tree.body.push({line:item.line,value:line});if(line.startsWith('title'))out+='<h1 style="font-size:42px;letter-spacing:-.05em;margin:0 0 16px">'+esc(extractQuoted(line))+'</h1>';else if(line.startsWith('text'))out+='<p style="font-size:18px;color:#475569;margin:0 0 16px;line-height:1.6">'+esc(extractQuoted(line))+'</p>';else if(line.startsWith('button'))out+='<button style="padding:12px 18px;border:none;border-radius:12px;background:#4f46e5;color:white;font-weight:700">'+esc(extractQuoted(line))+'</button>';else if(line.startsWith('feature')){if(!featureGridOpen){out+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;margin-top:24px">';featureGridOpen=true}out+='<div style="padding:22px;border:1px solid #e5e7eb;border-radius:18px;background:white"><h3 style="font-size:20px;margin:0 0 10px;color:#111827">'+esc(extractQuoted(line))+'</h3>'}else if(line==='}'&&featureGridOpen){out+='</div>';featureGridOpen=false}else if(line.includes('{')||line.includes('}')||line.startsWith('page')||line.startsWith('state')||line.startsWith('route')||line.startsWith('column')||line.startsWith('section')){}else errors.push('Line '+item.line+': unknown statement `'+line+'`')}if(featureGridOpen)out+='</div>';out+='</main>';return{tree,out,errors}}function compile(){const result=renderNew(editor.value);ast.textContent=JSON.stringify(result.tree,null,2);html.textContent=result.out;diagnostics.textContent=result.errors.length?result.errors.join('\n'):'No diagnostics. Looks clean.';status.textContent=result.errors.length?'Issues':'Ready';status.className=result.errors.length?'text-yellow-400':'text-green-400';preview.srcdoc='<!DOCTYPE html><html><body style="margin:0">'+result.out+'</body></html>'}let timer;editor.addEventListener('input',()=>{clearTimeout(timer);timer=setTimeout(compile,250)});document.getElementById('runBtn').onclick=compile;document.getElementById('copyBtn').onclick=()=>navigator.clipboard.writeText(editor.value);examples.onchange=()=>{editor.value=samples[examples.value];compile()};document.querySelectorAll('.tab').forEach(btn=>btn.onclick=()=>{document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));btn.classList.add('active');document.getElementById(btn.dataset.tab).classList.add('active')});compile();</script></body></html>
