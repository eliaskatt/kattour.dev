lockfileVersion: '9.0'

settings:
  autoInstallPeers: true
  excludeLinksFromLockfile: false

importers:

  .: {}

  apps/playground:
    dependencies:
      '@kattour/cli':
        specifier: workspace:*
        version: link:../../packages/cli
      '@kattour/compiler':
        specifier: workspace:*
        version: link:../../packages/compiler

  apps/website:
    dependencies:
      '@kattour/cli':
        specifier: workspace:*
        version: link:../../packages/cli
      '@kattour/compiler':
        specifier: workspace:*
        version: link:../../packages/compiler

  packages/cli:
    dependencies:
      '@kattour/compiler':
        specifier: workspace:*
        version: link:../compiler
    devDependencies:
      '@types/node':
        specifier: ^25.8.0
        version: 25.8.0
      typescript:
        specifier: latest
        version: 6.0.3

  packages/compiler:
    devDependencies:
      typescript:
        specifier: latest
        version: 6.0.3

  packages/kattour:
    dependencies:
      '@kattour/cli':
        specifier: workspace:*
        version: link:../cli

  packages/runtime: {}

  packages/stdlib: {}

  packages/ui: {}

packages:

  '@types/node@25.8.0':
    resolution: {integrity: sha512-TCFSk8IZh+iLX1xtksoBVtdmgL+1IX0fC9BeU4QqFSuNdN/K+HUlhqOzEmSYYpZUVsLYcPqc9KX+60iDuninSQ==}

  typescript@6.0.3:
    resolution: {integrity: sha512-y2TvuxSZPDyQakkFRPZHKFm+KKVqIisdg9/CZwm9ftvKXLP8NRWj38/ODjNbr43SsoXqNuAisEf1GdCxqWcdBw==}
    engines: {node: '>=14.17'}
    hasBin: true

  undici-types@7.24.6:
    resolution: {integrity: sha512-WRNW+sJgj5OBN4/0JpHFqtqzhpbnV0GuB+OozA9gCL7a993SmU+1JBZCzLNxYsbMfIeDL+lTsphD5jN5N+n0zg==}

snapshots:

  '@types/node@25.8.0':
    dependencies:
      undici-types: 7.24.6

  typescript@6.0.3: {}

  undici-types@7.24.6: {}
