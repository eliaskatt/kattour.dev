name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p dist
          cp apps/website/static/index.html dist/index.html
          cp apps/website/static/index.html dist/404.html
          if [ -d assets ]; then cp -R assets dist/assets; fi
          if [ -d examples ]; then cp -R examples dist/examples; fi
          if [ -d playground ]; then cp -R playground dist/playground; fi
          if [ -d templates ]; then cp -R templates dist/templates; fi
          if [ -d docs ]; then cp -R docs dist/docs; fi
          touch dist/.nojekyll
          echo "kattour-pages-ok" > dist/status.txt

      - name: Deploy to GitHub Pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ github.token }}
          publish_branch: gh-pages
          publish_dir: ./dist
          force_orphan: true
