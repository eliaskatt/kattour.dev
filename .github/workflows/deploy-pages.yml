name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p dist

          # Restore the legacy root website as the primary public website.
          cp index.html dist/index.html || true
          cp index.html dist/404.html || true
          cp modules.html dist/modules.html || true
          cp docs.html dist/docs.html || true
          cp examples.html dist/examples.html || true
          cp mobile.html dist/mobile.html || true
          cp playground.html dist/playground.html || true

          # Keep assets and optional newer sections available without replacing the legacy pages.
          cp -R assets dist/assets || true
          cp -R examples dist/examples || true
          cp -R playground dist/playground || true
          cp -R templates dist/templates || true
          cp -R docs dist/docs || true
          cp -R showcase dist/showcase || true
          cp -R components dist/components || true
          cp -R modules dist/modules || true
          cp -R install dist/install || true
          cp -R roadmap dist/roadmap || true
          cp -R integrations dist/integrations || true
          cp -R benchmarks dist/benchmarks || true
          cp -R themes dist/themes || true
          cp -R community dist/community || true
          cp -R site dist/site || true
          cp -R vscode dist/vscode || true

          # Keep the old visual design, but modernize the visible Kattour code snippets.
          if [ -f dist/modules.html ]; then
            sed -i 's#</body>#<script src="assets/js/kattour-modern-code.js"></script></body>#' dist/modules.html
          fi
          if [ -f dist/index.html ]; then
            sed -i 's#</body>#<script src="assets/js/kattour-modern-code.js"></script></body>#' dist/index.html
          fi

          touch dist/.nojekyll
          echo "kattour-legacy-design-modern-code" > dist/status.txt

      - name: Deploy to GitHub Pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ github.token }}
          publish_branch: gh-pages
          publish_dir: ./dist
          force_orphan: true
