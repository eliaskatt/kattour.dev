name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p dist
          cp apps/website/static/index.html dist/index.html
          cp apps/website/static/index.html dist/404.html
          cp -R assets dist/assets || true
          cp -R examples dist/examples || true
          cp -R playground dist/playground || true
          cp -R templates dist/templates || true
          cp -R docs dist/docs || true
          cp -R showcase dist/showcase || true
          cp -R components dist/components || true
          cp -R install dist/install || true
          cp -R roadmap dist/roadmap || true
          cp -R integrations dist/integrations || true
          cp -R benchmarks dist/benchmarks || true
          cp -R themes dist/themes || true
          cp -R community dist/community || true
          cp -R site dist/site || true
          touch dist/.nojekyll
          echo "kattour-pages-ok" > dist/status.txt

      - name: Deploy to GitHub Pages branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ github.token }}
          publish_branch: gh-pages
          publish_dir: ./dist
          force_orphan: true
