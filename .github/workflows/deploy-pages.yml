name: Deploy Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build compiler
        run: pnpm --filter @kattour/compiler build

      - name: Build CLI
        run: pnpm --filter @kattour/cli build

      - name: Build website
        run: |
          cd apps/website
          node ../../packages/cli/dist/index.js build app.kat

      - name: Build playground
        run: pnpm --filter @kattour/playground build

      - name: Assemble dist
        run: |
          mkdir -p dist/playground
          cp apps/website/dist/index.html dist/index.html
          cp apps/website/dist/index.html dist/404.html
          cp -r apps/playground/dist/. dist/playground/
          touch dist/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ github.token }}
          publish_branch: gh-pages
          publish_dir: ./dist
          force_orphan: true
