name: Publish npm packages

on:
  workflow_dispatch:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Verify npm token secret
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "NPM_TOKEN secret is missing or empty."
            echo "Add it in GitHub: Settings > Secrets and variables > Actions > New repository secret."
            exit 1
          fi
          echo "NPM_TOKEN is present."

      - name: Configure npm auth
        run: |
          echo "//registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN}" > ~/.npmrc
          npm whoami

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build compiler
        run: pnpm --filter @kattour/compiler build

      - name: Typecheck compiler
        run: pnpm --filter @kattour/compiler typecheck

      - name: Build CLI
        run: pnpm --filter @kattour/cli build

      - name: Typecheck CLI
        run: pnpm --filter @kattour/cli typecheck

      - name: Build kattour meta package
        run: pnpm --filter kattour build

      - name: Typecheck kattour meta package
        run: pnpm --filter kattour typecheck

      - name: Publish compiler
        working-directory: packages/compiler
        run: pnpm publish --access public --provenance --no-git-checks

      - name: Publish CLI
        working-directory: packages/cli
        run: pnpm publish --access public --provenance --no-git-checks

      - name: Publish kattour meta package
        working-directory: packages/kattour
        run: pnpm publish --access public --provenance --no-git-checks
