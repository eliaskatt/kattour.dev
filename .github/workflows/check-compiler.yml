name: Check Compiler

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4

      - run: pnpm install --frozen-lockfile=false

      - run: pnpm --filter @kattour/compiler build

      - run: pnpm --filter @kattour/cli build
